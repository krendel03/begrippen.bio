<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocabulary Study Game</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #15803d;
      --error: #b91c1c;
      --border: #dbe3ef;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 860px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 28px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2rem;
      margin: 0;
    }

    .subtext {
      color: var(--muted);
      font-size: 1rem;
      margin-top: 8px;
      line-height: 1.5;
    }

    .scoreboard {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pill {
      background: #eef4ff;
      color: #1e40af;
      border: 1px solid #cfe0ff;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .card {
      background: #fbfdff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      margin-top: 20px;
    }

    .label {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .definition {
      font-size: 1.5rem;
      line-height: 1.5;
      margin: 0;
      font-weight: 700;
    }

    .choices, .level-buttons, .actions {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    button, input[type="text"] {
      font: inherit;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      transition: transform 0.08s ease, background 0.2s ease, opacity 0.2s ease;
    }

    button:hover { transform: translateY(-1px); }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
      transform: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover { background: var(--primary-hover); }

    .btn-secondary {
      background: #eef2f7;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: #e8edf5; }

    .choice-btn {
      background: white;
      border: 1px solid var(--border);
      color: var(--text);
      text-align: left;
    }

    .choice-btn.correct {
      background: #eaf8ee;
      border-color: #86d7a0;
      color: var(--success);
    }

    .choice-btn.incorrect {
      background: #feeeee;
      border-color: #f3aaaa;
      color: var(--error);
    }

    .answer-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .answer-row input {
      flex: 1 1 280px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      font-size: 1rem;
      min-width: 0;
    }

    .feedback {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.5;
      display: none;
    }

    .feedback.show { display: block; }

    .feedback.correct {
      background: #eaf8ee;
      color: var(--success);
      border: 1px solid #86d7a0;
    }

    .feedback.incorrect {
      background: #feeeee;
      color: var(--error);
      border: 1px solid #f3aaaa;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .result-title {
      font-size: 1.6rem;
      margin: 0 0 8px;
    }

    .result-score {
      font-size: 2rem;
      font-weight: 800;
      margin: 12px 0;
      color: var(--primary);
    }

    @media (max-width: 640px) {
      .app { padding: 20px; }
      h1 { font-size: 1.65rem; }
      .definition { font-size: 1.2rem; }
      .result-score { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <h1>Vocabulary Study Game</h1>
        <div class="subtext">
          Choose a level, answer one definition at a time, and work through all 221 terms.
        </div>
      </div>
      <div class="scoreboard">
        <div class="pill" id="scorePill">Score: 0</div>
        <div class="pill" id="progressPill">Question: 0 / 0</div>
      </div>
    </div>

    <section class="screen active" id="startScreen">
      <div class="card">
        <div class="label">Choose level</div>
        <p class="definition">Pick how you want to study today.</p>
        <div class="level-buttons">
          <button class="btn-primary" id="level1Btn">Level 1 — Multiple Choice</button>
          <button class="btn-secondary" id="level2Btn">Level 2 — Input Mode</button>
        </div>
        <div class="footer-note">
          The full Excel list is loaded into the code: 221 words and definitions.
        </div>
      </div>
    </section>

    <section class="screen" id="quizScreen">
      <div class="card">
        <div class="label">Definition</div>
        <p class="definition" id="definitionText"></p>

        <div class="choices" id="choicesContainer"></div>

        <div class="answer-row" id="inputContainer" style="display: none;">
          <input type="text" id="answerInput" placeholder="Type the correct word..." autocomplete="off" />
          <button class="btn-primary" id="submitBtn">Submit</button>
        </div>

        <div class="feedback" id="feedbackBox"></div>

        <div class="actions">
          <button class="btn-secondary" id="nextBtn" style="display: none;">Next Question</button>
          <button class="btn-secondary" id="restartBtn">Restart</button>
        </div>
      </div>
    </section>

    <section class="screen" id="endScreen">
      <div class="card">
        <div class="label">Finished</div>
        <h2 class="result-title">You completed the quiz.</h2>
        <div class="result-score" id="finalScoreText"></div>
        <div class="subtext" id="finalSummaryText"></div>
        <div class="actions">
          <button class="btn-primary" id="playAgainBtn">Play Again</button>
        </div>
      </div>
    </section>
  </div>

    const state = {
      mode: null,
      questions: [],
      currentIndex: 0,
      score: 0,
      answered: false
    };

    const startScreen = document.getElementById("startScreen");
    const quizScreen = document.getElementById("quizScreen");
    const endScreen = document.getElementById("endScreen");

    const level1Btn = document.getElementById("level1Btn");
    const level2Btn = document.getElementById("level2Btn");

    const definitionText = document.getElementById("definitionText");
    const choicesContainer = document.getElementById("choicesContainer");
    const inputContainer = document.getElementById("inputContainer");
    const answerInput = document.getElementById("answerInput");
    const submitBtn = document.getElementById("submitBtn");
    const feedbackBox = document.getElementById("feedbackBox");
    const nextBtn = document.getElementById("nextBtn");
    const restartBtn = document.getElementById("restartBtn");
    const playAgainBtn = document.getElementById("playAgainBtn");

    const scorePill = document.getElementById("scorePill");
    const progressPill = document.getElementById("progressPill");
    const finalScoreText = document.getElementById("finalScoreText");
    const finalSummaryText = document.getElementById("finalSummaryText");

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function normalize(text) {
      return text.trim().toLowerCase();
    }

    function showScreen(screenToShow) {
      [startScreen, quizScreen, endScreen].forEach(screen => {
        screen.classList.remove("active");
      });
      screenToShow.classList.add("active");
    }

    function updateTopBar() {
      scorePill.textContent = `Score: ${state.score}`;
      progressPill.textContent = `Question: ${Math.min(state.currentIndex + 1, state.questions.length)} / ${state.questions.length}`;
    }

    function buildChoices(correctWord) {
      const wrongWords = vocabularyData
        .filter(item => item.word !== correctWord)
        .map(item => item.word);

      const shuffledWrongWords = shuffle(wrongWords).slice(0, 2);
      return shuffle([correctWord, ...shuffledWrongWords]);
    }

    function startGame(mode) {
      state.mode = mode;
      state.questions = shuffle(vocabularyData);
      state.currentIndex = 0;
      state.score = 0;
      state.answered = false;

      showScreen(quizScreen);
      renderQuestion();
    }

    function renderQuestion() {
      const currentQuestion = state.questions[state.currentIndex];
      state.answered = false;

      definitionText.textContent = currentQuestion.definition;
      feedbackBox.className = "feedback";
      feedbackBox.textContent = "";
      nextBtn.style.display = "none";

      updateTopBar();

      if (state.mode === "multiple") {
        renderMultipleChoice(currentQuestion);
      } else {
        renderInputMode();
      }
    }

    function renderMultipleChoice(question) {
      choicesContainer.innerHTML = "";
      choicesContainer.style.display = "grid";
      inputContainer.style.display = "none";

      const choices = buildChoices(question.word);

      choices.forEach(choice => {
        const button = document.createElement("button");
        button.className = "choice-btn";
        button.textContent = choice;
        button.addEventListener("click", () => handleMultipleChoiceAnswer(choice, question.word, button));
        choicesContainer.appendChild(button);
      });
    }

    function renderInputMode() {
      choicesContainer.style.display = "none";
      inputContainer.style.display = "flex";
      answerInput.value = "";
      answerInput.disabled = false;
      submitBtn.disabled = false;
      answerInput.focus();
    }

    function handleMultipleChoiceAnswer(selectedWord, correctWord, clickedButton) {
      if (state.answered) return;
      state.answered = true;

      const allButtons = choicesContainer.querySelectorAll("button");
      const isCorrect = selectedWord === correctWord;

      if (isCorrect) {
        state.score++;
      }

      allButtons.forEach(button => {
        button.disabled = true;
        if (button.textContent === correctWord) {
          button.classList.add("correct");
        } else if (button === clickedButton && !isCorrect) {
          button.classList.add("incorrect");
        }
      });

      showFeedback(isCorrect, correctWord);
    }

    function handleInputAnswer() {
      if (state.answered) return;

      const currentQuestion = state.questions[state.currentIndex];
      const userAnswer = normalize(answerInput.value);
      const correctAnswer = normalize(currentQuestion.word);

      state.answered = true;
      const isCorrect = userAnswer === correctAnswer;

      if (isCorrect) {
        state.score++;
      }

      answerInput.disabled = true;
      submitBtn.disabled = true;

      showFeedback(isCorrect, currentQuestion.word);
    }

    function showFeedback(isCorrect, correctWord) {
      feedbackBox.classList.add("show");

      if (isCorrect) {
        feedbackBox.classList.add("correct");
        feedbackBox.textContent = `Correct. The answer is "${correctWord}".`;
      } else {
        feedbackBox.classList.add("incorrect");
        feedbackBox.textContent = `Incorrect. The correct answer is "${correctWord}".`;
      }

      nextBtn.style.display = "block";
      updateTopBar();
    }

    function nextQuestion() {
      state.currentIndex++;

      if (state.currentIndex >= state.questions.length) {
        showResults();
        return;
      }

      renderQuestion();
    }

    function showResults() {
      showScreen(endScreen);
      finalScoreText.textContent = `${state.score} / ${state.questions.length}`;

      const percentage = Math.round((state.score / state.questions.length) * 100);
      finalSummaryText.textContent = `You answered ${percentage}% of the questions correctly.`;
      scorePill.textContent = `Score: ${state.score}`;
      progressPill.textContent = `Question: ${state.questions.length} / ${state.questions.length}`;
    }

    function restartGame() {
      state.mode = null;
      state.questions = [];
      state.currentIndex = 0;
      state.score = 0;
      state.answered = false;

      answerInput.value = "";
      answerInput.disabled = false;
      submitBtn.disabled = false;
      feedbackBox.className = "feedback";
      feedbackBox.textContent = "";
      choicesContainer.innerHTML = "";
      nextBtn.style.display = "none";

      scorePill.textContent = "Score: 0";
      progressPill.textContent = "Question: 0 / 0";

      showScreen(startScreen);
    }

    level1Btn.addEventListener("click", () => startGame("multiple"));
    level2Btn.addEventListener("click", () => startGame("input"));
    submitBtn.addEventListener("click", handleInputAnswer);
    nextBtn.addEventListener("click", nextQuestion);
    restartBtn.addEventListener("click", restartGame);
    playAgainBtn.addEventListener("click", restartGame);

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;

      const quizIsVisible = quizScreen.classList.contains("active");
      if (!quizIsVisible) return;

      if (state.answered) {
        nextQuestion();
        return;
      }

      if (state.mode === "input") {
        handleInputAnswer();
      }
    });
  </script>
</body>
</html>
